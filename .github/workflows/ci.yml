name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasm-tools
        run: cargo install wasm-tools

      - name: Install wit-bindgen
        run: cargo install --git https://github.com/scala-wasm/wit-bindgen --tag scala-wasm-wasm.4

      - name: Install cargo-component
        run: cargo install cargo-component --version 0.17.0

      - name: Install wkg
        run: cargo install wkg

      - name: Install wac
        run: cargo install wac-cli --locked

      - name: Run helloworld
        run: sbt helloworld/run

      - name: Test helloworld
        run: sbt helloworld/test

      - name: Run WASI HTTP client
        run: sbt wasiHttpClient/run

      - name: Build Spin TODO
        run: sbt spinTodo/fastLinkJS

      - name: Run Rust + Scala composition
        run: make -C rust-compose all
